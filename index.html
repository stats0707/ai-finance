            <div class="label">最新收盘价</div>
            <div class="value">¥${s.end_close}</div>
            <div class="sub">${s.end_date}</div>
        </div>
        <div class="stat-card ${totalRetClass}">
            <div class="label">期间总收益率</div>
            <div class="value">${s.total_return >= 0 ? '+' : ''}${s.total_return}%</div>
            <div class="sub">起始价: ¥${s.start_close}</div>
        </div>
        <div class="stat-card highlight">
            <div class="label">最高收盘价</div>
            <div class="value">¥${s.max_close}</div>
            <div class="sub">${s.max_close_date}</div>
        </div>
        <div class="stat-card">
            <div class="label">最低收盘价</div>
            <div class="value">¥${s.min_close}</div>
            <div class="sub">${s.min_close_date}</div>
        </div>
        <div class="stat-card">
            <div class="label">平均收盘价</div>
            <div class="value">¥${s.avg_close}</div>
            <div class="sub">标准差: ¥${s.std_close}</div>
        </div>
        <div class="stat-card">
            <div class="label">平均日涨跌幅</div>
            <div class="value">${s.avg_pct_chg >= 0 ? '+' : ''}${s.avg_pct_chg}%</div>
            <div class="sub">最大涨幅: +${s.max_pct_chg}% / 最大跌幅: ${s.min_pct_chg}%</div>
        </div>
        <div class="stat-card up">
            <div class="label">上涨天数</div>
            <div class="value">${s.up_days}</div>
            <div class="sub">占比: ${(s.up_days / s.total_days * 100).toFixed(1)}%</div>
        </div>
        <div class="stat-card down">
            <div class="label">下跌天数</div>
            <div class="value">${s.down_days}</div>
            <div class="sub">占比: ${(s.down_days / s.total_days * 100).toFixed(1)}%</div>
        </div>
        <div class="stat-card">
            <div class="label">平均成交量</div>
            <div class="value">${(s.avg_vol / 10000).toFixed(1)}万</div>
            <div class="sub">单位: 手</div>
        </div>
    `;
}

// Chart defaults
Chart.defaults.color = '#8a9bb0';
Chart.defaults.borderColor = '#1e2d42';
Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif';

function renderPriceChart(data) {
    const ctx = document.getElementById('priceChart').getContext('2d');
    const labels = data.map(d => d.date);
    const closes = data.map(d => d.close);
    const vols = data.map(d => d.vol);

    // MA20
    const ma20 = [];
    for (let i = 0; i < closes.length; i++) {
        if (i < 19) { ma20.push(null); continue; }
        let sum = 0;
        for (let j = i - 19; j <= i; j++) sum += closes[j];
        ma20.push(sum / 20);
    }

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                {
                    type: 'line',
                    label: '收盘价 (元)',
                    data: closes,
                    borderColor: '#00d4ff',
                    backgroundColor: 'rgba(0, 212, 255, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.1,
                    yAxisID: 'y',
                    pointRadius: 0,
                    pointHoverRadius: 5,
                },
                {
                    type: 'line',
                    label: '20日均线',
                    data: ma20,
                    borderColor: '#ffd700',
                    borderWidth: 1.5,
                    borderDash: [5, 5],
                    fill: false,
                    yAxisID: 'y',
                    pointRadius: 0,
                },
                {
                    type: 'bar',
                    label: '成交量 (手)',
                    data: vols,
                    backgroundColor: data.map(d => d.pct_chg >= 0 ? 'rgba(0, 255, 136, 0.3)' : 'rgba(255, 77, 109, 0.3)'),
                    yAxisID: 'y1',
                    order: 99,
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            scales: {
                x: { grid: { display: false }, ticks: { maxTicksLimit: 12 } },
                y: {
                    position: 'left',
                    title: { display: true, text: '价格 (元)', color: '#00d4ff' },
                    grid: { color: '#1e2d42' },
                },
                y1: {
                    position: 'right',
                    title: { display: true, text: '成交量 (手)', color: '#8a9bb0' },
                    grid: { display: false },
                    ticks: { callback: v => (v / 10000).toFixed(0) + '万' }
                }
            },
            plugins: {
                legend: { labels: { usePointStyle: true } },
                tooltip: {
                    backgroundColor: '#0d1b2a',
                    borderColor: '#00d4ff',
                    borderWidth: 1,
                    callbacks: {
                        label: ctx => {
                            if (ctx.dataset.yAxisID === 'y1') return ctx.dataset.label + ': ' + (ctx.parsed.y / 10000).toFixed(1) + '万';
                            return ctx.dataset.label + ': ¥' + ctx.parsed.y.toFixed(2);
                        }
                    }
                }
            }
        }
    });
}

function renderReturnDist(data) {
    const ctx = document.getElementById('returnDistChart').getContext('2d');
    const returns = data.map(d => d.pct_chg).filter(r => r !== null && !isNaN(r));

    // Create bins
    const min = Math.min(...returns);
    const max = Math.max(...returns);
    const binCount = 25;
    const binSize = (max - min) / binCount;
    const bins = Array(binCount).fill(0);
    const labels = [];
    for (let i = 0; i < binCount; i++) {
        const lo = min + i * binSize;
        labels.push(lo.toFixed(1) + '%');
        for (const r of returns) {
            if (r >= lo && r < lo + binSize) bins[i]++;
        }
    }

    const mean = returns.reduce((a, b) => a + b, 0) / returns.length;

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: '天数',
                data: bins,
                backgroundColor: bins.map((_, i) => {
                    const lo = min + i * binSize;
                    return lo >= 0 ? 'rgba(0, 255, 136, 0.6)' : 'rgba(255, 77, 109, 0.6)';
                }),
                borderColor: bins.map((_, i) => {
                    const lo = min + i * binSize;
                    return lo >= 0 ? '#00ff88' : '#ff4d6d';
                }),
                borderWidth: 1,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { grid: { display: false }, ticks: { maxTicksLimit: 10 } },
                y: { title: { display: true, text: '频次 (天)' }, grid: { color: '#1e2d42' } }
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: '#0d1b2a',
                    callbacks: { label: ctx => ctx.parsed.y + ' 天' }
                }
            }
        }
    });
}

            },

function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    // Show in reverse order (latest first)
    const reversed = [...data].reverse();
    tbody.innerHTML = reversed.map(d => {
        const pctClass = d.pct_chg >= 0 ? 'up' : 'down';
        const pctSign = d.pct_chg >= 0 ? '+' : '';
        return `<tr>
            <td>${d.date}</td>
            <td>¥${d.open.toFixed(2)}</td>
            <td>¥${d.high.toFixed(2)}</td>
            <td>¥${d.low.toFixed(2)}</td>
            <td><strong>¥${d.close.toFixed(2)}</strong></td>
            <td class="${pctClass}">${pctSign}${d.pct_chg}%</td>
            <td>${d.vol.toLocaleString()}</td>
            <td>${d.amount.toLocaleString()}</td>
        </tr>`;
    }).join('');
}
